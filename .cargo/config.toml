# ============================================
# Rust Build Configuration - Max 10GB RAM
# ============================================

[build]
# Limit parallel compilation jobs
# 2 jobs max to stay under 10GB
jobs = 2

# Use rust-lld linker (faster, less memory than link.exe)
rustflags = [
    "-C", "linker=rust-lld.exe",
    "-C", "link-arg=-fuse-ld=lld",
]

# ============================================
# Release Profile - Memory Optimized
# ============================================
[profile.release]
# Reduce optimization effort (saves ~30% memory)
opt-level = 2

# INCREASE codegen units to split work (key for memory!)
# More units = smaller chunks = less memory per unit
codegen-units = 32

# Disable LTO (saves massive memory)
lto = false

# Strip debug info (saves ~20% memory)
debug = false

# Don't compress panic messages
panic = "abort"

# ============================================
# Per-Crate Settings for Memory-Hungry Crates
# ============================================
[profile.release.package.wgpu]
# Split wgpu into many small units
codegen-units = 128

[profile.release.package.wgpu-core]
codegen-units = 128

[profile.release.package.naga]
codegen-units = 128

[profile.release.package.candle-transformers]
codegen-units = 128

[profile.release.package.swash]
codegen-units = 64

[profile.release.package.skrifa]
codegen-units = 64

# ============================================
# Windows-Specific: Use LLVM linker
# ============================================
[target.x86_64-pc-windows-msvc]
linker = "rust-lld.exe"

# Alternative: Use mold if installed (even faster)
# [target.x86_64-pc-windows-msvc]
# linker = "mold.exe"

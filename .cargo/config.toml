# ============================================
# Rust Build Configuration - Cranelift Backend
# Uses ~50% less memory, builds 30-70% faster
# ============================================

[build]
# Limit to 2 parallel jobs for 10GB RAM constraint
jobs = 2

# Use rust-lld linker
rustflags = [
    "-C", "linker=rust-lld.exe",
]

# ============================================
# Enable Cranelift (MUCH less memory than LLVM)
# ============================================
[unstable]
codegen-backend = true

[profile.dev]
codegen-backend = "cranelift"
incremental = true

[profile.release]
codegen-backend = "cranelift"
opt-level = 2
debug = false
lto = false
panic = "abort"
strip = true

# ============================================
# Windows Linker
# ============================================
[target.x86_64-pc-windows-msvc]
linker = "rust-lld.exe"

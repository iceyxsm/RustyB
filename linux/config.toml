# ============================================
# Rust Build Configuration for Linux
# Memory-optimized build settings
# ============================================

[build]
# Limit to 2 parallel jobs for 10GB RAM constraint
jobs = 2

# Use rust-lld linker (faster than default linker)
rustflags = [
    "-C", "linker=rust-lld",
]

[profile.dev]
incremental = true
opt-level = 0

[profile.release]
opt-level = 2
debug = false
lto = false
panic = "abort"
strip = true

# ============================================
# Linux Linker Configuration
# ============================================
[target.x86_64-unknown-linux-gnu]
linker = "rust-lld"
